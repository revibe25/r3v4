name: Docs & Security ASI-MAX Audit

on:
  pull_request:
    paths:
      - "**/*.md"
      - "SECURITY.md"
      - "r3_master_fix.py"
      - "docs/**"
      - ".github/workflows/docs_and_security_audit.yml"
  push:
    paths:
      - "**/*.md"
      - "SECURITY.md"
      - "r3_master_fix.py"
      - "docs/**"
      - ".github/workflows/docs_and_security_audit.yml"

jobs:
  markdown_lint:
    name: Markdown Formatting Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint
        run: npm install -g markdownlint-cli
      - name: Lint all markdown files
        run: markdownlint '**/*.md'

  references_and_security:
    name: Reference and Security Findings Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run ASI-MAX doc+security check
        run: python3 r3_master_fix.py --color
      - name: Check SECURITY.md for overdue findings
        run: python3 scripts/security_due_check.py

  artifact_reference_check:
    name: Artifact reference table check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for all required tracked docs
        run: |
          python3 scripts/verify_artifacts_exist.py REFERENCE_STATUS.md docs/WIRE.txt docs/DEMO_CHECKLIST.md