name: Docs and Security Audit

on:
  pull_request:
    paths:
      - '**.md'
      - 'SECURITY.md'
      - 'docs/WIRE.txt'
      - 'docs/DEMO_CHECKLIST.md'
      - 'r3_master_fix.py'

jobs:
  lint-reference-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint all markdown files
        run: markdownlint **/*.md

      - name: Run doc reference check
        run: |
          python3 r3_master_fix.py --color