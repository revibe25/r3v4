[build]
builder = "nixpacks"
buildCommand = "pnpm install"

[deploy]
# Remove migration from start - we'll run it manually after app is healthy
startCommand = "node dist/index.js"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.healthcheck]
path = "/health"
timeout = 30
interval = 60
