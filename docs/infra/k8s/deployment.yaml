---
# ═══════════════════════════════════════════════════════════════
# R3/NATIVE — Kubernetes Manifests
# Updated: February 2026
# ═══════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: r3vibe
  labels:
    app.kubernetes.io/name: r3vibe
    environment: production

---
# ═══════════════════════════════════════════════════════════════
# DEPLOYMENT
# ═══════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: r3vibe-api
  namespace: r3vibe
  labels:
    app: r3vibe-api
    app.kubernetes.io/name: r3vibe-api
    app.kubernetes.io/version: "4.0"
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  revisionHistoryLimit: 3

  selector:
    matchLabels:
      app: r3vibe-api

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1         # Allow 1 extra pod during rollout
      maxUnavailable: 0   # Never take a pod down before new one is ready

  template:
    metadata:
      labels:
        app: r3vibe-api
        app.kubernetes.io/version: "4.0"
      annotations:
        # Force pod restart when secrets change (optional — remove if not needed)
        checksum/secrets: "use-sha-of-secret-manifest-here"

    spec:
      # ── Graceful shutdown ────────────────────────────────────
      terminationGracePeriodSeconds: 30

      # ── Security: don't run as root ─────────────────────────
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001

      # ── Spread pods across nodes for HA ─────────────────────
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: r3vibe-api

      containers:
      - name: api
        image: r3vibe/server:4.0.0   # ← pin to exact version, never :latest in prod
        imagePullPolicy: Always

        ports:
        - name: http
          containerPort: 3001
          protocol: TCP

        # ── Resource limits (CRITICAL — was missing) ─────────
        resources:
          requests:
            cpu: "250m"      # 0.25 CPU guaranteed
            memory: "256Mi"
          limits:
            cpu: "1000m"     # 1 CPU max before throttling
            memory: "512Mi"  # OOMKilled if exceeded — tune based on load testing

        # ── Environment: non-sensitive values ────────────────
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3001"
        - name: LOG_LEVEL
          value: "info"

        # ── Environment: sensitive values from Secret ─────────
        envFrom:
        - secretRef:
            name: r3vibe-secrets   # pulls all keys from the secret as env vars

        # Alternative: individual key references (more explicit):
        # - name: DATABASE_URL
        #   valueFrom:
        #     secretKeyRef:
        #       name: r3vibe-secrets
        #       key: DATABASE_URL
        # - name: JWT_SECRET
        #   valueFrom:
        #     secretKeyRef:
        #       name: r3vibe-secrets
        #       key: JWT_SECRET
        # - name: AWS_ACCESS_KEY_ID
        #   valueFrom:
        #     secretKeyRef:
        #       name: r3vibe-secrets
        #       key: AWS_ACCESS_KEY_ID
        # - name: AWS_SECRET_ACCESS_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: r3vibe-secrets
        #       key: AWS_SECRET_ACCESS_KEY
        # - name: STRIPE_SECRET_KEY
        #   valueFrom:
        #     secretKeyRef:
        #       name: r3vibe-secrets
        #       key: STRIPE_SECRET_KEY

        # ── Liveness probe (was missing) ─────────────────────
        # If this fails → pod is restarted
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15   # Wait for app to start
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3

        # ── Readiness probe (was missing) ─────────────────────
        # If this fails → pod removed from Service load balancer
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        # ── Startup probe (for slow cold starts) ─────────────
        startupProbe:
          httpGet:
            path: /health
            port: http
          failureThreshold: 12      # Allow up to 60s to start (12 * 5s)
          periodSeconds: 5

        # ── Container security ────────────────────────────────
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

        # ── Writable temp dirs (needed with readOnlyRootFilesystem) ──
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: uploads
          mountPath: /app/uploads

      volumes:
      - name: tmp
        emptyDir: {}
      - name: uploads
        emptyDir: {}   # Replace with PVC if uploads need to persist across pods
        # persistentVolumeClaim:
        #   claimName: r3vibe-uploads-pvc

---
# ═══════════════════════════════════════════════════════════════
# SERVICE
# ═══════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: r3vibe-api
  namespace: r3vibe
  labels:
    app: r3vibe-api
spec:
  type: ClusterIP
  selector:
    app: r3vibe-api
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

---
# ═══════════════════════════════════════════════════════════════
# HORIZONTAL POD AUTOSCALER
# ═══════════════════════════════════════════════════════════════
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: r3vibe-hpa
  namespace: r3vibe
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: r3vibe-api
  minReplicas: 2
  maxReplicas: 10

  metrics:
  # Scale on CPU (was already here)
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Scale on memory too (was missing — important for audio/AI workloads)
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60    # Wait 60s before scaling up again
      policies:
      - type: Pods
        value: 2                        # Add max 2 pods at a time
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300   # Wait 5min before scaling down (prevents flapping)
      policies:
      - type: Pods
        value: 1                        # Remove max 1 pod at a time
        periodSeconds: 120

---
# ═══════════════════════════════════════════════════════════════
# POD DISRUPTION BUDGET
# Ensures at least 1 pod stays up during node drains / upgrades
# ═══════════════════════════════════════════════════════════════
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: r3vibe-pdb
  namespace: r3vibe
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: r3vibe-api

---
