<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LLPTE — Live Demo</title>
<style>
  :root {
    --bg:     #0a0a0f;
    --panel:  #11111a;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2:#4fc3f7;
    --good:   #4caf50;
    --warn:   #ff9800;
    --bad:    #f44336;
    --text:   #e0e0e0;
    --muted:  #666;
    --mono:   'JetBrains Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 14px; line-height: 1.6; min-height: 100vh;
  }
  header {
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  header h1 span { color: var(--accent); }
  .badge {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: #1a1a2e; border: 1px solid var(--accent);
    color: var(--accent); font-family: var(--mono);
  }
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    height: calc(100vh - 61px);
  }
  .sidebar {
    border-right: 1px solid var(--border);
    overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .main { overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .card {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .track-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.15s;
    margin-bottom: 6px;
  }
  .track-row:hover { background: #1a1a2e; border-color: var(--border); }
  .track-row.active { background: #1a1a2e; border-color: var(--accent); }
  .track-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .track-name { flex: 1; font-weight: 500; font-size: 13px; }
  .track-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .key-badge {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    font-family: var(--mono); font-weight: 700;
  }
  .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  input[type=range] {
    width: 100%; accent-color: var(--accent); cursor: pointer;
  }
  .weight-row { margin-bottom: 10px; }
  .weight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .weight-val { font-family: var(--mono); font-size: 12px; color: var(--accent); }
  select, button {
    background: #1a1a2e; border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 8px 12px;
    font-size: 13px; cursor: pointer; width: 100%;
  }
  select:focus, button:focus { outline: 2px solid var(--accent); }
  button { background: var(--accent); border-color: var(--accent); font-weight: 600; }
  button:hover { opacity: 0.85; }
  .candidates { display: flex; flex-direction: column; gap: 10px; }
  .candidate {
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px;
    transition: border-color 0.2s;
  }
  .candidate.rank-1 { border-color: var(--accent); }
  .candidate-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .rank { font-size: 11px; color: var(--muted); font-family: var(--mono); min-width: 24px; }
  .rank-1 .rank { color: var(--accent); font-weight: 700; }
  .cname { font-weight: 600; font-size: 14px; flex: 1; }
  .score-big {
    font-size: 22px; font-weight: 800; font-family: var(--mono);
  }
  .breakdown { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 12px; }
  .dim { text-align: center; }
  .dim-bar-wrap {
    height: 48px; display: flex; align-items: flex-end; justify-content: center;
  }
  .dim-bar {
    width: 28px; border-radius: 3px 3px 0 0;
    transition: height 0.4s ease;
  }
  .dim-label { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .dim-val { font-size: 11px; font-family: var(--mono); font-weight: 600; }
  .params {
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .param-chip {
    font-size: 11px; padding: 3px 8px; border-radius: 4px;
    background: #1a1a2e; border: 1px solid var(--border);
    font-family: var(--mono);
  }
  .latency-bar {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--mono); font-size: 12px;
  }
  .latency-val { color: var(--good); font-weight: 700; min-width: 70px; }
  .latency-bg {
    flex: 1; height: 4px; background: var(--border); border-radius: 2px;
  }
  .latency-fill { height: 100%; border-radius: 2px; background: var(--good); transition: width 0.3s; }
  .empty-state {
    text-align: center; color: var(--muted); padding: 48px 24px;
  }
  .empty-state svg { opacity: 0.3; margin-bottom: 12px; }
  .perf-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .perf-row:last-child { border-bottom: none; }
  .perf-label { color: var(--muted); font-size: 12px; }
  .perf-val { font-family: var(--mono); font-size: 12px; color: var(--good); font-weight: 600; }
  .source-label {
    font-size: 11px; color: var(--muted); margin-bottom: 8px;
  }
  .source-name { font-size: 15px; font-weight: 700; color: var(--accent); }
  .add-btn {
    background: transparent; border: 1px dashed var(--border);
    color: var(--muted); margin-top: 4px;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); background: transparent; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <h1><span>LLPTE</span> — Low-Latency Predictive Transition Engine</h1>
  <span class="badge">v0.1.0 · DEMO</span>
</header>
<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="card">
    <div class="card-title">Library</div>
    <div id="track-list"></div>
    <button class="add-btn" onclick="addRandomTrack()">+ Add Random Track</button>
  </div>

  <div class="card">
    <div class="card-title">Weight Profile</div>
    <select id="profile-select" onchange="applyProfile()">
      <option value="default">Default (Balanced)</option>
      <option value="harmonic">Harmonic Focus</option>
      <option value="energetic">Energetic</option>
      <option value="broadcast">Broadcast</option>
      <option value="custom">Custom</option>
    </select>
    <div style="height:12px"></div>
    <div id="weight-controls"></div>
  </div>

  <div class="card">
    <div class="card-title">Performance</div>
    <div id="perf-panel"></div>
  </div>

</div>

<!-- MAIN -->
<div class="main">
  <div class="card" id="source-card">
    <div class="source-label">Scoring from →</div>
    <div class="source-name" id="source-display">Select a track from the library</div>
  </div>
  <div id="candidates-area">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
      </svg>
      <div>Select a track to see ranked transition candidates</div>
    </div>
  </div>
</div>
</div>

<script>
// ── LLPTE Engine (inline port of scoreModel.ts) ──────────────────────────────

const CAMELOT = {
  '1A':['1A','2A','12A','1B'],'2A':['2A','3A','1A','2B'],'3A':['3A','4A','2A','3B'],
  '4A':['4A','5A','3A','4B'],'5A':['5A','6A','4A','5B'],'6A':['6A','7A','5A','6B'],
  '7A':['7A','8A','6A','7B'],'8A':['8A','9A','7A','8B'],'9A':['9A','10A','8A','9B'],
  '10A':['10A','11A','9A','10B'],'11A':['11A','12A','10A','11B'],'12A':['12A','1A','11A','12B'],
  '1B':['1B','2B','12B','1A'],'2B':['2B','3B','1B','2A'],'3B':['3B','4B','2B','3A'],
  '4B':['4B','5B','3B','4A'],'5B':['5B','6B','4B','5A'],'6B':['6B','7B','5B','6A'],
  '7B':['7B','8B','6B','7A'],'8B':['8B','9B','7B','8A'],'9B':['9B','10B','8B','9A'],
  '10B':['10B','11B','9B','10A'],'11B':['11B','12B','10B','11A'],'12B':['12B','1B','11B','12A'],
};

const PROFILES = {
  default:   { h:0.35, e:0.25, s:0.20, p:0.10, t:0.10 },
  harmonic:  { h:0.60, e:0.15, s:0.10, p:0.10, t:0.05 },
  energetic: { h:0.20, e:0.50, s:0.15, p:0.05, t:0.10 },
  broadcast: { h:0.30, e:0.20, s:0.30, p:0.10, t:0.10 },
};

function scoreH(a, b) {
  if (!a.key || !b.key) return 0.3;
  if (a.key === b.key) return 1.0;
  if ((CAMELOT[a.key]||[]).includes(b.key)) return 0.75;
  const an = parseInt(a.key), bn = parseInt(b.key);
  if (!isNaN(an) && !isNaN(bn) && Math.abs(an-bn)<=2) return 0.4;
  return 0.1;
}
function scoreE(a, b) {
  return Math.max(0, 1.0 - Math.pow(Math.abs(a.energy-b.energy), 0.7)*1.8);
}
function scoreS(a, b) {
  if (a.sc<=0||b.sc<=0) return 0.5;
  return Math.max(0, 1.0 - Math.abs(a.sc-b.sc)/Math.max(a.sc,b.sc)*1.5);
}
function scoreP(a, b) {
  if (a.phase===undefined||b.phase===undefined) return 0.5;
  const d = Math.abs(a.phase-b.phase)%(2*Math.PI);
  return Math.max(0, 1.0 - Math.min(d,2*Math.PI-d)/Math.PI);
}
function scoreT(a, b) {
  if (a.bpm<=0||b.bpm<=0) return 0.3;
  const r = Math.min(a.bpm,b.bpm)/Math.max(a.bpm,b.bpm);
  const df = Math.min(a.bpm*2,b.bpm)/Math.max(a.bpm*2,b.bpm);
  const db = Math.min(a.bpm,b.bpm*2)/Math.max(a.bpm,b.bpm*2);
  return Math.max(r, Math.max(df,db)*0.75);
}
function selectDuration(score) {
  if (score>=0.85) return 4000;
  if (score>=0.70) return 8000;
  if (score>=0.50) return 12000;
  return 20000;
}
function selectCurve(bd) {
  if (bd.e>0.8) return 'equal-power';
  if (bd.h>0.8&&bd.e>0.6) return 's-curve';
  if (bd.s<0.4) return 'logarithmic';
  return 'linear';
}
function normalizeW(w) {
  const s = w.h+w.e+w.s+w.p+w.t;
  if (s===0) return {...PROFILES.default};
  return {h:w.h/s,e:w.e/s,s:w.s/s,p:w.p/s,t:w.t/s};
}
function scoreTransition(from, to, w) {
  const nw = normalizeW(w);
  const bd = { h:scoreH(from,to), e:scoreE(from,to), s:scoreS(from,to), p:scoreP(from,to), t:scoreT(from,to) };
  const total = bd.h*nw.h + bd.e*nw.e + bd.s*nw.s + bd.p*nw.p + bd.t*nw.t;
  const score = parseFloat(Math.min(1,Math.max(0,total)).toFixed(4));
  return { score, bd, duration: selectDuration(score), curve: selectCurve(bd) };
}

// ── Track library ─────────────────────────────────────────────────────────────

const KEYS = ['1A','2A','3A','4A','5A','6A','7A','8A','9A','10A','11A','12A',
              '1B','2B','3B','4B','5B','6B','7B','8B','9B','10B','11B','12B'];
const COLORS = ['#7c6af7','#4fc3f7','#f06292','#81c784','#ffb74d','#e57373','#64b5f6','#a5d6a7'];
const NAMES = ['Track Alpha','Track Beta','Track Gamma','Track Delta','Track Epsilon',
               'Track Zeta','Track Eta','Track Theta','Track Iota','Track Kappa',
               'Track Lambda','Track Mu'];

let tracks = [];
let selectedId = null;
let weights = { ...PROFILES.default };
let trackCounter = 0;

function makeTrack(seed) {
  const r = (min,max) => min + ((seed*9301+49297)%233280)/233280*(max-min);
  return {
    id: `track-${++trackCounter}`,
    name: NAMES[trackCounter % NAMES.length] + (trackCounter > NAMES.length ? ` ${Math.floor(trackCounter/NAMES.length)+1}` : ''),
    color: COLORS[trackCounter % COLORS.length],
    bpm: Math.round(r(90,160)),
    key: KEYS[Math.floor(r(0,KEYS.length))],
    energy: parseFloat(r(0.2,1.0).toFixed(2)),
    sc: parseFloat(r(800,8000).toFixed(0)),
    phase: parseFloat(r(0,Math.PI*2).toFixed(3)),
    rms: parseFloat(r(0.3,0.9).toFixed(2)),
  };
}

function addRandomTrack() {
  tracks.push(makeTrack(Date.now() % 99991 + trackCounter * 137));
  render();
}

// Seed library
[1,42,137,256,512,99].forEach(s => tracks.push(makeTrack(s)));

// ── Weight controls ───────────────────────────────────────────────────────────

const DIMS = [
  { key:'h', label:'Harmonic', color:'#7c6af7' },
  { key:'e', label:'Energy',   color:'#4fc3f7' },
  { key:'s', label:'Spectral', color:'#81c784' },
  { key:'p', label:'Phase',    color:'#ffb74d' },
  { key:'t', label:'Tempo',    color:'#f06292' },
];

function renderWeightControls() {
  const el = document.getElementById('weight-controls');
  el.innerHTML = DIMS.map(d => `
    <div class="weight-row">
      <div class="weight-header">
        <span class="label" style="color:${d.color}">${d.label}</span>
        <span class="weight-val" id="wv-${d.key}">${(weights[d.key]*100).toFixed(0)}%</span>
      </div>
      <input type="range" min="0" max="100" value="${Math.round(weights[d.key]*100)}"
        oninput="onWeightChange('${d.key}',this.value)" />
    </div>
  `).join('');
}

function onWeightChange(key, val) {
  document.getElementById('profile-select').value = 'custom';
  weights[key] = parseFloat(val)/100;
  document.getElementById(`wv-${key}`).textContent = `${Math.round(val)}%`;
  if (selectedId) renderCandidates();
}

function applyProfile() {
  const p = document.getElementById('profile-select').value;
  if (p !== 'custom') {
    weights = { ...PROFILES[p] };
    renderWeightControls();
    if (selectedId) renderCandidates();
  }
}

// ── Score colour ──────────────────────────────────────────────────────────────

function scoreColor(s) {
  if (s >= 0.85) return 'var(--good)';
  if (s >= 0.70) return '#8bc34a';
  if (s >= 0.50) return 'var(--warn)';
  return 'var(--bad)';
}

function keyColor(key) {
  return key.endsWith('A') ? '#7c6af7' : '#4fc3f7';
}

// ── Render track list ─────────────────────────────────────────────────────────

function renderTrackList() {
  const el = document.getElementById('track-list');
  el.innerHTML = tracks.map(t => `
    <div class="track-row ${t.id===selectedId?'active':''}" onclick="selectTrack('${t.id}')">
      <div class="track-dot" style="background:${t.color}"></div>
      <div>
        <div class="track-name">${t.name}</div>
        <div class="track-meta">${t.bpm} BPM</div>
      </div>
      <span class="key-badge" style="background:${keyColor(t.key)}22;color:${keyColor(t.key)};border:1px solid ${keyColor(t.key)}44">${t.key}</span>
    </div>
  `).join('');
}

// ── Render candidates ─────────────────────────────────────────────────────────

function renderCandidates() {
  const from = tracks.find(t => t.id === selectedId);
  if (!from) return;

  document.getElementById('source-display').textContent =
    `${from.name} — ${from.bpm} BPM · ${from.key} · Energy ${(from.energy*100).toFixed(0)}%`;

  const t0 = performance.now();
  const scored = tracks
    .filter(t => t.id !== selectedId)
    .map(t => ({ track:t, result: scoreTransition(from, t, weights) }))
    .sort((a,b) => b.result.score - a.result.score);
  const elapsed = performance.now() - t0;

  renderPerfPanel(elapsed, scored.length);

  const el = document.getElementById('candidates-area');
  el.innerHTML = `<div class="candidates">${scored.slice(0,6).map((c,i) => {
    const { score, bd, duration, curve } = c.result;
    const t = c.track;
    return `
      <div class="candidate ${i===0?'rank-1':''}">
        <div class="candidate-header">
          <div class="rank">#${i+1}</div>
          <div class="track-dot" style="background:${t.color}"></div>
          <div class="cname">${t.name}</div>
          <span class="key-badge" style="background:${keyColor(t.key)}22;color:${keyColor(t.key)};border:1px solid ${keyColor(t.key)}44">${t.key}</span>
          <div class="track-meta">${t.bpm} BPM</div>
          <div class="score-big" style="color:${scoreColor(score)}">${(score*100).toFixed(1)}</div>
        </div>
        <div class="breakdown">
          ${DIMS.map(d => {
            const v = bd[d.key];
            return `
              <div class="dim">
                <div class="dim-bar-wrap">
                  <div class="dim-bar" style="height:${Math.max(4,v*48)}px;background:${d.color}88;border-top:2px solid ${d.color}"></div>
                </div>
                <div class="dim-val" style="color:${d.color}">${(v*100).toFixed(0)}</div>
                <div class="dim-label">${d.label}</div>
              </div>`;
          }).join('')}
        </div>
        <div class="params">
          <span class="param-chip" style="color:var(--accent2)">⏱ ${duration/1000}s crossfade</span>
          <span class="param-chip" style="color:#81c784">⤴ ${curve}</span>
          <span class="param-chip">↗ ${t.bpm} BPM</span>
          <span class="param-chip">⚡ ${(t.energy*100).toFixed(0)}% energy</span>
        </div>
      </div>`;
  }).join('')}</div>`;
}

function renderPerfPanel(elapsed, n) {
  document.getElementById('perf-panel').innerHTML = `
    <div class="perf-row">
      <span class="perf-label">Candidates scored</span>
      <span class="perf-val">${n} tracks</span>
    </div>
    <div class="perf-row">
      <span class="perf-label">Ranking latency</span>
      <span class="perf-val">${elapsed.toFixed(3)} ms</span>
    </div>
    <div class="perf-row">
      <span class="perf-label">Budget (10ms)</span>
      <span class="perf-val">${(elapsed/10*100).toFixed(1)}% used</span>
    </div>
    <div style="margin-top:10px">
      <div class="latency-bar">
        <span class="latency-val">${elapsed.toFixed(3)}ms</span>
        <div class="latency-bg">
          <div class="latency-fill" style="width:${Math.min(100,elapsed/10*100)}%;background:${elapsed<5?'var(--good)':elapsed<8?'var(--warn)':'var(--bad)'}"></div>
        </div>
        <span style="font-size:11px;color:var(--muted)">10ms</span>
      </div>
    </div>
  `;
}

function selectTrack(id) {
  selectedId = id;
  renderTrackList();
  renderCandidates();
}

function render() {
  renderTrackList();
  renderWeightControls();
  if (selectedId) renderCandidates();
}

render();
// Auto-select first track for immediate impact on load
selectTrack(tracks[0].id);
</script>
</body>
</html>
